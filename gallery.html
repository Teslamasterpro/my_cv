<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Photography — Aditya Patel</title>
	<meta name="description" content="Travel photography by Aditya Patel — Germany, India, Greece, Thailand, Indonesia, and beyond.">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&family=Instrument+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="css/icomoon.css">
	<link rel="stylesheet" href="css/theme.css">
</head>
<body>

	<!-- ===== Nav ===== -->
	<nav class="nav" aria-label="Main">
		<div class="nav-inner">
			<a href="index.html" class="nav-logo">Aditya Patel</a>
			<ul class="nav-links">
				<li><a href="index.html#about">About</a></li>
				<li><a href="index.html#experience">Experience</a></li>
				<li><a href="index.html#skills">Skills</a></li>
				<li><a href="index.html#projects">Projects</a></li>
				<li><a href="index.html#photography">Photography</a></li>
			</ul>
			<a href="mailto:adityarpatel@outlook.com" class="btn btn-primary">Get in touch</a>
		</div>
	</nav>

	<!-- ===== Gallery ===== -->
	<section class="section photo-section" style="padding-top: 160px;">
		<div class="container">
			<div class="section-head">
				<span class="eyebrow">Photography</span>
				<h2 data-split>Glimpses of my journeys.</h2>
				<p>Tap any photo to view it full size.</p>
			</div>
			<div class="photo-grid reveal-group">
				<button class="photo" style="background-image: url(images/corfu.jpg);" data-img="images/corfu.jpg" data-title="Corfu" data-caption="Greece">
					<span class="photo-label"><strong>Corfu</strong><span>Greece</span></span>
				</button>
				<button class="photo" style="background-image: url(images/udaipur.jpg);" data-img="images/udaipur.jpg" data-title="Udaipur" data-caption="Rajasthan, India">
					<span class="photo-label"><strong>Udaipur</strong><span>India</span></span>
				</button>
				<button class="photo" style="background-image: url(images/badkissingen.jpg);" data-img="images/badkissingen.jpg" data-title="Bad Kissingen" data-caption="Bavaria, Germany">
					<span class="photo-label"><strong>Bad Kissingen</strong><span>Germany</span></span>
				</button>
				<button class="photo" style="background-image: url(images/kreuzberg.jpg);" data-img="images/kreuzberg.jpg" data-title="Kreuzberg" data-caption="Bavaria, Germany">
					<span class="photo-label"><strong>Kreuzberg</strong><span>Germany</span></span>
				</button>
				<button class="photo" style="background-image: url(images/bangkok.jpg);" data-img="images/bangkok.jpg" data-title="Bangkok" data-caption="Thailand">
					<span class="photo-label"><strong>Bangkok</strong><span>Thailand</span></span>
				</button>
				<button class="photo" style="background-image: url(images/rothenburg.jpg);" data-img="images/rothenburg.jpg" data-title="Rothenburg" data-caption="Bavaria, Germany">
					<span class="photo-label"><strong>Rothenburg</strong><span>Germany</span></span>
				</button>
				<button class="photo" style="background-image: url(images/ochsenfurt.jpg);" data-img="images/ochsenfurt.jpg" data-title="Ochsenfurt" data-caption="Bavaria, Germany">
					<span class="photo-label"><strong>Ochsenfurt</strong><span>Germany</span></span>
				</button>
				<button class="photo" style="background-image: url(images/bali.jpg);" data-img="images/bali.jpg" data-title="Bali" data-caption="Ubud, Indonesia">
					<span class="photo-label"><strong>Bali</strong><span>Indonesia</span></span>
				</button>
				<button class="photo" style="background-image: url(images/gertelcreek.jpg);" data-img="images/gertelcreek.jpg" data-title="Gertel Creek" data-caption="Baden-Württemberg, Germany">
					<span class="photo-label"><strong>Gertel Creek</strong><span>Germany</span></span>
				</button>
			</div>
			<div class="photo-more reveal">
				<a href="index.html#photography" class="btn btn-ghost">← Back to homepage</a>
			</div>
		</div>
	</section>

	<!-- ===== Footer ===== -->
	<footer class="footer">
		<div class="container footer-inner">
			<span>© 2026 Aditya Patel</span>
			<span>Designed &amp; built by Aditya Patel</span>
		</div>
	</footer>

	<!-- ===== Lightbox ===== -->
	<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
		<button class="lightbox-close" aria-label="Close photo">×</button>
		<figure>
			<img src="" alt="">
			<figcaption>
				<strong class="lb-title"></strong>
				<span class="lb-caption"></span>
			</figcaption>
		</figure>
	</div>

	<script src="https://unpkg.com/lenis@1.2.3/dist/lenis.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
	<script src="js/site.js"></script>
</body>
</html>
