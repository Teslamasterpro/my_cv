	<script>
	// When a tile is clicked, populate and show the modal
	$('#lightbox').on('show.bs.modal', function (event) {
	  var link = $(event.relatedTarget);
	  if (!link || !link.length) { link = $('a.work.last-clicked'); }
	  var imgSrc = link && link.data ? (link.data('img') || '') : '';
	  var title = link && link.data ? (link.data('title') || '') : '';
	  var caption = link && link.data ? (link.data('caption') || '') : '';
	  var modal = $(this);
	  modal.find('#lightboxImage').attr('src', imgSrc);
	  modal.find('#lightboxTitle').text(title);
	  modal.find('#lightboxCaption').text(caption);
	});
	</script>
